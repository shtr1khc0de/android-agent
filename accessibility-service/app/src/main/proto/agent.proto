syntax = "proto3";

package com.project.ratatoskr;

option java_package = "com.project.ratatoskr";

option java_multiple_files = true;

message ScreenDump {
  string package_name = 1;
  int64 timestamp = 2;
  int32 width = 3;
  int32 height = 4;
  repeated UiNode nodes = 5;

}

message UiNode {
  int32 id = 1;
  int32 parent_id = 2;
  string text = 3;
  string resource_id = 4;
  string class_name = 5;
  bool is_clickable = 6;
  Rect bounds = 7;
}

message Rect {
  int32 left = 1;
  int32 right = 2;
  int32 top = 3;
  int32 bottom = 4;
}

message AgentCMD {
  enum CMDType{
    CLICK = 0;
    TYPE_TEXT = 1;
    GET_DUMP = 2;
  }
  CMDType type = 1;
  string target_id = 2;
  string payload = 3;
}