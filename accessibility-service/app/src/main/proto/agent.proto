syntax = "proto3";

message ScreenDump {
  string package_name = 1;
  int64 timestamp = 2;
  int32 width = 3;
  int32 height = 4;
  repeated UiNode nodes = 5;

}

message UiNode {
    string text = 1;
    string resource_id = 2;
    string cont_desc = 3;
    bool is_clickable = 4;
    Rect bounds = 6;
}

message Rect{
  int32 left =1;
  int32 right = 2;
  int32 top = 3;
  int32 bottom = 4;
}