syntax = "proto3";

package com.project.control;

option go_package = "github.com/Vancheszz/android-agent/internal/control";



message NidhoggHello {
  string container_id = 1;     
  int32 screen_width = 2;      
  int32 screen_height = 3;      
  string version = 4;           
}


message NidhoggRequest {
  oneof payload {
    TapCommand tap = 1;
    SwipeCommand swipe = 2;
    CropRequest crop = 3;
    GetDumpRequest get_dump = 4; 
  }
}

message TapCommand {
  int32 x = 1;
  int32 y = 2;
}

message SwipeCommand {
  int32 x1 = 1;
  int32 y1 = 2;
  int32 x2 = 3;
  int32 y2 = 4;
  int32 duration_ms = 5;
}

message CropRequest {
  int32 x = 1;
  int32 y = 2;
  int32 width = 3;
  int32 height = 4;
}

message GetDumpRequest {
  
}

message NidhoggResponse {
  bool success = 1;
  string error_msg = 2;

  oneof data {
    bytes image_data = 3;           
    ScreenDump screen_dump = 4;     
  }
}

message ScreenDump {
  string package_name = 1;
  int64 timestamp = 2;
  int32 width = 3;
  int32 height = 4;
  repeated UiNode nodes = 5;
}

message UiNode {
  int32 id = 1;
  int32 parent_id = 2;
  string text = 3;
  string resource_id = 4;
  string class_name = 5;
  bool is_clickable = 6;
  Rect bounds = 7;
}

message Rect {
  int32 left = 1;
  int32 right = 2;
  int32 top = 3;
  int32 bottom = 4;
}